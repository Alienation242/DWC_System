<mat-toolbar color="primary">
  <span>🌿 DWC Controller</span>

  <span class="spacer"></span>

  <div class="theme-selector-container">
    <span style="font-size: 12px; margin-right: 10px">THEME:</span>
    <select
      class="simple-theme-select"
      [(ngModel)]="currentTheme"
      (change)="setTheme(currentTheme)"
    >
      <option value="theme-default">Default Light</option>
      <option value="theme-pipboy-mono">Pip-Boy 3000</option>
      <option value="theme-bioshock">Rapture Botany</option>
    </select>
  </div>

  <span class="status-text" style="margin-left: 20px">Online</span>
</mat-toolbar>

<mat-sidenav-container>
  <mat-sidenav mode="side" opened>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">📊 Dashboard</a>
      <a mat-list-item routerLink="/watchdog" routerLinkActive="active">🛡️ Watchdog</a>
      <a mat-list-item routerLink="/nutrient" routerLinkActive="active">🧪 Nutrient Profile</a>
      <a mat-list-item routerLink="/calibration" routerLinkActive="active">⚙️ Calibration</a>
      <a mat-list-item routerLink="/manual" routerLinkActive="active">🎮 Manual Controls</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
