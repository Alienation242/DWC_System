<mat-card class="pot-card summary-square" [routerLink]="['/pot', potId]">
  <mat-card-header>
    <mat-card-title>Pot {{ potId }}</mat-card-title>
    <mat-card-subtitle>Phase: {{ phase }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="summary-content">
    <div class="gauge-column">
      <div class="summary-readout">
        <span class="label">pH</span>
        <span class="value">{{ telemetry?.realPH | number: '1.2-2' }}</span>
      </div>
      <div class="summary-readout">
        <span class="label">EC</span>
        <span class="value">{{ telemetry?.realEC | number: '1.0-0' }}</span>
      </div>
    </div>

    <div class="led-panel">
      <div class="led-container">
        <div class="led" [class.active-danger]="telemetry?.isTankEmpty"></div>
        <span class="led-label">EMPTY</span>
      </div>
      <div class="led-container">
        <div class="led" [class.active-warning]="telemetry?.isTankOverflowing"></div>
        <span class="led-label">OVERFLOW</span>
      </div>
    </div>

    <div class="click-hint">CLICK FOR DETAILS ➔</div>
  </mat-card-content>
</mat-card>
