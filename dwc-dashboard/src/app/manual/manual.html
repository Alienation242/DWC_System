<mat-card>
  <mat-card-title>🎮 Manual Overrides</mat-card-title>
  <mat-card-content>
    <div class="button-group">
      <button mat-raised-button color="warn" (click)="emergencyStop()">⛔ Emergency Stop</button>
    </div>
    <mat-divider></mat-divider>

    <!-- Pot selector for dosing -->
    <div style="margin: 15px 0">
      <mat-form-field appearance="fill" style="width: 150px">
        <mat-label>Target Pot</mat-label>
        <mat-select [(ngModel)]="dosePot">
          <mat-option value="A">Pot A</mat-option>
          <mat-option value="B">Pot B</mat-option>
        </mat-select>
      </mat-form-field>
      <span style="margin-left: 15px">All doses below will go to this pot</span>
    </div>

    <h3>Dose Water</h3>
    <div><input type="number" [(ngModel)]="waterVol" step="100" /> ml</div>
    <button mat-raised-button (click)="doseWater()">💧 Dose Water</button>

    <h3>Dose pH Up</h3>
    <div><input type="number" [(ngModel)]="phUpVol" step="1" /> ml</div>
    <button mat-raised-button (click)="dosePhUp()">🔼 pH Up</button>

    <h3>Dose pH Down</h3>
    <div><input type="number" [(ngModel)]="phDownVol" step="1" /> ml</div>
    <button mat-raised-button (click)="dosePhDown()">🔽 pH Down</button>

    <h3>Deliver to Pot (Submersible)</h3>
    <div>
      <mat-form-field>
        <mat-label>Pot</mat-label>
        <mat-select [(ngModel)]="deliverTarget">
          <mat-option value="A">A</mat-option>
          <mat-option value="B">B</mat-option>
        </mat-select>
      </mat-form-field>
      <input type="number" [(ngModel)]="deliverVol" step="100" /> ml
    </div>
    <button mat-raised-button (click)="deliver()">🚰 Deliver</button>
  </mat-card-content>
</mat-card>
