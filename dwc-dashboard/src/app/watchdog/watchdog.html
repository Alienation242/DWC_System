<mat-card>
  <mat-card-title>🛡️ Pump Watchdog Configuration</mat-card-title>
  <mat-card-content>
    <table mat-table [dataSource]="configs" class="mat-elevation-z2">
      <ng-container matColumnDef="pumpName">
        <th mat-header-cell *matHeaderCellDef>Pump</th>
        <td mat-cell *matCellDef="let c">{{ c.pumpName }}</td>
      </ng-container>
      <ng-container matColumnDef="dailyLimitMl">
        <th mat-header-cell *matHeaderCellDef>Daily Limit (ml)</th>
        <td mat-cell *matCellDef="let c">
          <input type="number" [(ngModel)]="c.dailyLimitMl" step="1" />
        </td>
      </ng-container>
      <ng-container matColumnDef="cooldownSecs">
        <th mat-header-cell *matHeaderCellDef>Cooldown (s)</th>
        <td mat-cell *matCellDef="let c">
          <input type="number" [(ngModel)]="c.cooldownSecs" step="5" />
        </td>
      </ng-container>
      <ng-container matColumnDef="enabled">
        <th mat-header-cell *matHeaderCellDef>Enabled</th>
        <td mat-cell *matCellDef="let c">
          <mat-slide-toggle [(ngModel)]="c.enabled"></mat-slide-toggle>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let c">
          <button mat-raised-button color="primary" (click)="save(c)">Save</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
